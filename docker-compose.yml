
services:
  spletni-streznik:
    build:
      context: .
      dockerfile_inline: |
        FROM php:apache
        RUN docker-php-ext-install pdo pdo_mysql
        RUN a2enmod rewrite
    restart: unless-stopped
    ports:
      - 127.0.0.1:8080:80
    volumes:
      - ./data/www:/var/www/html/

  mysql:
    hostname: podatkovna-baza
    image: mysql:latest
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=superVarnoGeslo
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:80"
    environment:
      PMA_HOST: podatkovna-baza

  node:
    image: node:18
    container_name: node_sass
    working_dir: /var/www/html
    restart: unless-stopped
    volumes:
      - ./data/www:/var/www/html
      - ./data/www:/workspace
      - node_modules:/var/www/html/node_modules
      - node_modules:/workspace/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
      - SHELL=/bin/sh
    command: sh -c "cd /var/www/html && if [ -f package-lock.json ]; then npm ci; else npm install; fi && npm run dev"

volumes:
  node_modules:
